# Render Blueprint — connect repo → New Blueprint → deploy API
# Required dashboard env (set before first deploy):
#   DATABASE_URL  — Supabase Postgres pooler URI
#   CORS_ORIGIN   — Netlify site URL (e.g. https://your-app.netlify.app)
services:
  - type: web
    name: sk-mobile-api
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: >-
      NPM_CONFIG_PRODUCTION=false npm ci &&
      npm run build --workspace=@sk-mobile/shared &&
      npm run db:generate --workspace=@sk-mobile/api &&
      npm run build --workspace=@sk-mobile/api &&
      npm run db:migrate --workspace=@sk-mobile/api
    startCommand: npm run start:prod --workspace=@sk-mobile/api
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: "https://sk-inventory.netlify.app"
      - key: PORT
        value: "10000"
  - type: cron
    name: sk-mobile-api-keepalive
    schedule: "*/14 * * * *"
    command: curl -fsS "https://sk-mobile-api.onrender.com/health" || true
