# Netlify — connect repo → auto-detects this file
# Set in Netlify UI → Environment variables:
#   NEXT_PUBLIC_API_URL = https://sk-mobile-api.onrender.com  (your Render API URL)

[build]
  command = "npm ci --workspace=@sk-mobile/shared --workspace=@sk-mobile/web --include-workspace-root && npm run build --workspace=@sk-mobile/shared && npm run build --workspace=@sk-mobile/web"
  publish = "apps/web/.next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web packages/shared netlify.toml package.json package-lock.json"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
