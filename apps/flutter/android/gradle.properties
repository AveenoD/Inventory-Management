org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false
org.gradle.parallel=true
org.gradle.caching=false
org.gradle.daemon=true
# Required on Windows when project (D:) and pub cache (C:) are on different drives
kotlin.incremental=false

# Force bundled ML Kit model for mobile_scanner so it works immediately without Play Services download
dev.steenbakker.mobile_scanner.useUnbundled=false
