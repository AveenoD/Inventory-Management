name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=@sk-mobile/shared
      - run: npm run lint --workspace=@sk-mobile/shared
      - run: npm run lint --workspace=@sk-mobile/api
      - run: npm run test --workspace=@sk-mobile/api

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@sk-mobile/api

      - run: npm run build --workspace=@sk-mobile/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
